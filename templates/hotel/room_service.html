<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0A2342; min-height: 100vh; padding: 20px; }
        .header { text-align: center; color: white; padding: 30px 0 20px 0; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 50px;">🏨</div>
    <h2 style="color: white;">Welcome!</h2>
    <p style="color: #D4A843;">Enter your room number to access services</p>
</div>

<div class="container">
    <div class="card p-4">
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">🛏️ Room Number</label>
                <input type="text" name="room_number" class="form-control form-control-lg"
                    placeholder="Enter your room number" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                Enter →
            </button>
        </form>
    </div>
</div>

</body>
</html>
