<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room {{ room.room_number }} Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0A2342; min-height: 100vh; padding: 20px; }
        .header { text-align: center; color: white; padding: 30px 0 20px 0; }
        .service-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 15px;
            text-decoration: none;
            color: #0A2342;
            display: block;
            transition: transform 0.2s;
        }
        .service-card:hover { transform: scale(1.02); color: #0A2342; }
        .service-icon { font-size: 45px; margin-bottom: 10px; }
        .service-title { font-size: 18px; font-weight: bold; }
        .service-desc { font-size: 13px; color: #64748B; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 50px;">🏨</div>
    <h2 style="color: white;">Room {{ room.room_number }}</h2>
    <p style="color: #D4A843;">{{ room.room_type }} • Welcome!</p>
</div>

<div class="container">
    <div class="row">
        <div class="col-6">
            <a href="/room/food/" class="service-card">
                <div class="service-icon">🍽️</div>
                <div class="service-title">Food Order</div>
                <div class="service-desc">Order food</div>
            </a>
        </div>
        <div class="col-6">
            <a href="/room/housekeeping/" class="service-card">
                <div class="service-icon">🧹</div>
                <div class="service-title">Housekeeping</div>
                <div class="service-desc">Request cleaning</div>
            </a>
        </div>
        <div class="col-6">
            <a href="/room/maintenance/" class="service-card">
                <div class="service-icon">🔧</div>
                <div class="service-title">Maintenance</div>
                <div class="service-desc">Report issue</div>
            </a>
        </div>
        <div class="col-6">
            <a href="/room/spa/" class="service-card">
                <div class="service-icon">💆</div>
                <div class="service-title">Spa Booking</div>
                <div class="service-desc">Book spa</div>
            </a>
        </div>
        <div class="col-12">
            <a href="/room/cab/" class="service-card">
                <div class="service-icon">🚗</div>
                <div class="service-title">Cab Booking</div>
                <div class="service-desc">Book a car</div>
            </a>
        </div>
    </div>
    <a href="/room/" class="btn btn-outline-light w-100 mt-2">← Change Room</a>
</div>

</body>
</html>
