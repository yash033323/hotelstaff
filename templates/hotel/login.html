<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0A2342;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            font-size: 50px;
            margin-bottom: 10px;
        }
        .login-title {
            text-align: center;
            color: #0A2342;
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .login-subtitle {
            text-align: center;
            color: #94A3B8;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .btn-login {
            background-color: #0A2342;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
        }
        .btn-login:hover {
            background-color: #1B5299;
            color: white;
        }
        .form-control {
            padding: 12px;
            border-radius: 8px;
        }
        .form-label {
            font-weight: 600;
            color: #0A2342;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="login-logo">🏨</div>
    <div class="login-title">Hotel Staff Login</div>
    <div class="login-subtitle">Enter your credentials to access dashboard</div>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
