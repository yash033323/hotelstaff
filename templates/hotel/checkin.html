<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .checkin-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="checkin-box">
    <h4 class="mb-1">✅ Check In</h4>
    <p class="text-muted mb-4">Room {{ room.room_number }} - {{ room.room_type }}</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">👤 Guest Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter guest name" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">📞 Phone Number</label>
            <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">🛏️ Room</label>
            <input type="text" class="form-control" value="Room {{ room.room_number }} - {{ room.room_type }} - ₹{{ room.price }}/night" disabled>
        </div>
        <button type="submit" class="btn btn-primary w-100">✅ Confirm Check In</button>
        <a href="/staff/reception/" class="btn btn-secondary w-100 mt-2">Cancel</a>
    </form>
</div>
</body>
</html>
